        .balloon { position:absolute;bottom:-150px;width:60px;height:75px;border-radius:50% 50% 50% 50%/40% 40% 60% 60%;background:radial-gradient(circle at 30% 30%,rgba(255,255,255,0.8),rgba(255,255,255,0) 20%),var(--b-color);box-shadow:inset -5px -5px 15px rgba(0,0,0,0.1),2px 5px 10px rgba(0,0,0,0.1);transform-style:preserve-3d;will-change:transform,opacity;animation:floatUp3D linear infinite; }

// ── BALLOON ANIMATION ────────────────────────────────────────────────────────
let balloonsInit=false;
function initBalloons(){
    if(balloonsInit)return;
    const scene=document.getElementById('balloon-scene');
    const colors=['#4A7C59','#A4C3B2','#D4A373','#EFECE6','#8FBC8F'];
    for(let i=0;i<20;i++){
        const b=document.createElement('div');
        b.classList.add('balloon');
        b.style.left=`${Math.random()*100}%`;
        b.style.animationDuration=`${15+Math.random()*25}s`;
        b.style.animationDelay=`${Math.random()*-20}s`;
        b.style.setProperty('--b-color',colors[Math.floor(Math.random()*colors.length)]);
        b.style.setProperty('--drift',`${(Math.random()-0.5)*300}px`);
        b.style.setProperty('--drift-end',`${(Math.random()-0.5)*500}px`);
        scene.appendChild(b);
    }
    balloonsInit=true;
}


// ── ADMIN DATA LOADERS ───────────────────────────────────────────────────────
function loadAdminData(){
    fetch("/api/admin/bookings").then(r=>r.json()).then(d=>{adminOrders=d;document.getElementById('app-container').innerHTML=views.admin();})
    .catch(()=>{adminOrders=[...dummyOrders];document.getElementById('app-container').innerHTML=views.admin();});
}
function loadAdminUsers(){
    fetch("/api/admin/users").then(r=>r.json()).then(d=>{adminUsers=d.map(u=>({...u,bookings:u.bookings||0}));document.getElementById('app-container').innerHTML=views.admin();})
    .catch(()=>{adminUsers=[...dummyUsers];document.getElementById('app-container').innerHTML=views.admin();});
}
function updateBooking(id,action){
    fetch(`/api/admin/update-booking/${id}`,{method:"PUT",headers:{"Content-Type":"application/json"},body:JSON.stringify({action})})
    .then(r=>r.json()).then(d=>{showToast(d.message||"Updated!","success");_applyBookingUpdate(id,action);})
    .catch(()=>{_applyBookingUpdate(id,action);showToast("Booking updated!","success");});
}
function _applyBookingUpdate(id,action){
    const src=adminOrders.length?adminOrders:dummyOrders;
    const o=src.find(x=>x.id===id);
    if(o){o.order_status=action==='accept'?'Confirmed':'Rejected';o.payment_status=action==='accept'?'Paid':'Pending';}
    document.getElementById('app-container').innerHTML=views.admin();
}

// ── ROUTER ───────────────────────────────────────────────────────────────────
function router(viewName, param=null){
    const container=document.getElementById('app-container');
    const bgContainer=document.getElementById('balloon-bg');
    const body=document.body;
    window.scrollTo(0,0);
    if(viewName==='home'){bgContainer.classList.add('active');initBalloons();}
    else{bgContainer.classList.remove('active');}
    if(viewName==='admin'){body.classList.add('admin-mode');loadAdminData();return;}
    else{body.classList.remove('admin-mode');}
    if(views[viewName]){
        container.innerHTML=views[viewName](param);
        if(viewName==='dashboard'){setTimeout(loadUserBookings,100);}
    }
}

// ── NAVIGATION HELPERS ───────────────────────────────────────────────────────
function selectParentTheme(id){const p=themesData.find(t=>t.id===id);if(p){state.selectedParent=p;router('subThemes');}}
function selectSubTheme(id){const sub=state.selectedParent.variations.find(t=>t.id===id);if(sub){state.currentTheme=sub;router('themeDetails');}}
function setAdminTab(tab){state.adminTab=tab;if(tab==='users'){loadAdminUsers();}else if(tab==='orders'){loadAdminData();}else{document.getElementById('app-container').innerHTML=views.admin();}}
function toggleAdminSidebar(){const s=document.getElementById('admin-sidebar');if(s)s.classList.toggle('-translate-x-full');}
function toggleMobileMenu(){document.getElementById('mobile-menu').classList.toggle('hidden');}

// ── BOOKING LOGIC ────────────────────────────────────────────────────────────
function confirmBooking(){
    const name=document.getElementById('custName').value.trim();
    const phone=document.getElementById('custPhone').value.trim();
    const address=document.getElementById('custAddress').value.trim();
    const eventDate=document.getElementById('eventDate').value;
    const timeSlot=document.getElementById('timeSlot').value;
    if(!name||!phone||!address||!eventDate){showToast('Please fill all details','error');return;}
    bookingDraft={name,phone,address,event_date:eventDate,time_slot:timeSlot,theme_name:state.currentTheme.name,price:state.currentTheme.price};
    router('payment');
}
function confirmPayment(){
    if(!bookingDraft||!bookingDraft.name){showToast('Booking data missing','error');return;}
    bookingDraft.email=localStorage.getItem('userEmail');
    fetch('/api/bookings',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(bookingDraft)})
    .then(r=>r.json()).then(d=>{if(d.success){showToast('Payment Successful!','success');router('tracking');}else{showToast('Booking Failed','error');}})
    .catch(()=>{showToast('Server Error','error');});
}

// ── USER BOOKINGS ────────────────────────────────────────────────────────────
function loadUserBookings(){
    const email=localStorage.getItem('userEmail');
    const container=document.getElementById('user-bookings-container');
    if(!container)return;
    if(!email){container.innerHTML='<div class="text-center py-12"><p class="text-gray-500">Please <a href="/login" class="text-renova-green font-bold underline">login</a> to see your bookings.</p></div>';return;}
    fetch(`/api/user-bookings/${email}`).then(r=>r.json()).then(bookings=>{
        if(!bookings||bookings.length===0){container.innerHTML='<div class="text-center py-12 text-gray-400"><i class="fas fa-calendar-times text-4xl mb-4"></i><p>No bookings yet. <button onclick="router(\'categories\')" class="text-renova-green font-bold underline">Book your first event!</button></p></div>';return;}
        container.innerHTML=bookings.map(b=>`
        <div class="bg-white p-5 rounded-xl shadow-card border border-gray-100">
          <div class="flex justify-between items-start">
            <div><h3 class="text-lg font-bold text-renova-green mb-1">${b.theme_name}</h3><p class="text-sm text-gray-500"><i class="fas fa-calendar mr-1"></i>${new Date(b.event_date).toLocaleDateString('en-IN')} · ${b.time_slot}</p></div>
            <span class="px-3 py-1 rounded-full text-xs font-bold ${b.order_status==='Confirmed'?'bg-green-100 text-green-700':b.order_status==='Rejected'?'bg-red-100 text-red-700':'bg-yellow-100 text-yellow-700'}">${b.order_status}</span>
          </div>
          <div class="mt-3 pt-3 border-t flex justify-between text-sm"><span class="text-gray-500">Payment: <span class="${b.payment_status==='Paid'?'text-green-600 font-semibold':'text-orange-500 font-semibold'}">${b.payment_status}</span></span></div>
        </div>`).join('');
    }).catch(()=>{container.innerHTML='<p class="text-red-500">Error loading bookings.</p>';});
}

function viewUserHistory(email){
    const orders=(adminOrders.length?adminOrders:dummyOrders).filter(o=>o.email===email);
    const user=(adminUsers.length?adminUsers:dummyUsers).find(u=>u.email===email);
    if(!user)return;
    const m=document.createElement('div');m.className='fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4';
    m.innerHTML=`<div class="bg-white rounded-2xl shadow-2xl max-w-lg w-full p-6 fade-in"><div class="flex justify-between items-center mb-4"><h3 class="font-bold text-lg">${user.name}'s Bookings</h3><button onclick="this.closest('.fixed').remove()" class="text-gray-400 hover:text-gray-600"><i class="fas fa-times"></i></button></div>${orders.length===0?'<p class="text-gray-500 text-sm">No bookings found.</p>':`<div class="space-y-3 max-h-80 overflow-y-auto">${orders.map(o=>`<div class="p-3 bg-gray-50 rounded-lg text-sm"><div class="font-medium">${o.theme_name}</div><div class="text-gray-500 text-xs mt-1">${new Date(o.event_date).toLocaleDateString('en-IN')} · ${o.time_slot}</div><span class="text-xs px-2 py-0.5 rounded-full font-bold mt-1 inline-block ${o.order_status==='Confirmed'?'bg-green-100 text-green-700':o.order_status==='Rejected'?'bg-red-100 text-red-700':'bg-yellow-100 text-yellow-700'}">${o.order_status}</span></div>`).join('')}</div>`}</div>`;
    document.body.appendChild(m);
}

// ── TOAST ────────────────────────────────────────────────────────────────────
function showToast(message,type='success'){
    const container=document.getElementById('toast-container');
    const toast=document.createElement('div');
    toast.className=`toast ${type==='success'?'bg-green-600':'bg-red-600'} text-white px-6 py-3 rounded-lg shadow-lg mb-3 flex items-center gap-3`;
    toast.innerHTML=`<i class="fas ${type==='success'?'fa-check-circle':'fa-exclamation-circle'}"></i><span>${message}</span>`;
    container.appendChild(toast);
    requestAnimationFrame(()=>toast.classList.add('show'));
    setTimeout(()=>{toast.classList.remove('show');setTimeout(()=>toast.remove(),300);},3000);
}

// ── PROFILE DROPDOWN ─────────────────────────────────────────────────────────
function toggleProfileDropdown(){
    const dd = document.getElementById('profile-dropdown');
    dd.classList.toggle('hidden');
}
// Close dropdown when clicking outside
document.addEventListener('click', function(e){
    const wrapper = document.getElementById('profile-dropdown-wrapper');
    if(wrapper && !wrapper.contains(e.target)){
        document.getElementById('profile-dropdown').classList.add('hidden');
    }
});

function loadProfileUI(){
    const name  = localStorage.getItem('userName') || '';
    const email = localStorage.getItem('userEmail') || '';
    const phone = localStorage.getItem('userPhone') || '';
    const initial = name ? name.charAt(0).toUpperCase() : (email ? email.charAt(0).toUpperCase() : '?');

    // Desktop avatar
    const avatar = document.getElementById('profile-avatar');
    if(avatar) avatar.innerHTML = name || email ? `<span class="text-sm font-bold">${initial}</span>` : '<i class="fas fa-user text-xs"></i>';

    // Dropdown info
    const dAvatar = document.getElementById('dropdown-avatar');
    const dName   = document.getElementById('dropdown-name');
    const dEmail  = document.getElementById('dropdown-email');
    const dPhone  = document.getElementById('dropdown-phone');
    if(dAvatar) dAvatar.textContent = initial;
    if(dName)   dName.textContent   = name  || 'Guest';
    if(dEmail)  dEmail.textContent  = email || 'Not logged in';
    if(dPhone)  dPhone.textContent  = phone ? '📞 ' + phone : '';

    // Mobile bar
    const mBar   = document.getElementById('mobile-user-bar');
    const mAvatar= document.getElementById('mobile-avatar');
    const mName  = document.getElementById('mobile-name');
    const mEmail = document.getElementById('mobile-email');
    if(name || email){
        if(mBar)    mBar.classList.remove('hidden');
        if(mAvatar) mAvatar.textContent = initial;
        if(mName)   mName.textContent   = name  || 'User';
        if(mEmail)  mEmail.textContent  = email || '';
    }
}

function logoutUser(){
    localStorage.removeItem('userEmail');
    localStorage.removeItem('userName');
    localStorage.removeItem('userPhone');
    localStorage.removeItem('role');
    showToast('Logged out successfully!', 'success');
    setTimeout(() => { window.location.href = '/login'; }, 1000);
}

// ── INIT ─────────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded',()=>{
    const role=localStorage.getItem('role');
    const adminBtn=document.getElementById('admin-nav-btn');
    if(role==='admin'&&adminBtn)adminBtn.classList.remove('hidden');
    loadProfileUI();
    router('home');
});
</script>
