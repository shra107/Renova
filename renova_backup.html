    <style>
        /* --- CUSTOM 3D BALLOON ANIMATION (HOME ONLY) --- */
        #balloon-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
            background: linear-gradient(to bottom, #F5F1E8 0%, #EFECE6 100%);
            opacity: 0;
            transition: opacity 0.8s ease-in-out;
        }

        #balloon-bg.active {
            opacity: 1;
        }

        .balloon-container {
            position: relative;
            width: 100%;
            height: 100%;
            perspective: 1000px;
            transform-style: preserve-3d;
        }

        .balloon {
            position: absolute;
            bottom: -150px;
            width: 60px;
            height: 75px;
            border-radius: 50% 50% 50% 50% / 40% 40% 60% 60%;
            background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.8), rgba(255,255,255,0) 20%),
                        var(--b-color);
            box-shadow: inset -5px -5px 15px rgba(0,0,0,0.1), 
                        2px 5px 10px rgba(0,0,0,0.1);
            transform-style: preserve-3d;
            will-change: transform, opacity;
            animation: floatUp3D linear infinite;
        }

        .balloon::after {
            content: '';
            position: absolute;
            bottom: -6px;
            left: 50%;
            transform: translateX(-50%);
            width: 10px;
            height: 8px;
            background: var(--b-color);
            border-radius: 3px;
        }

        .balloon::before {
            content: '';
            position: absolute;
            bottom: -50px;
            left: 50%;
            transform: translateX(-50%);
            width: 1px;
            height: 50px;
            background: rgba(0,0,0,0.15);
        }

        @keyframes floatUp3D {
            0% { transform: translateY(0) translateX(0) translateZ(0) rotateY(0deg) rotateX(0deg) scale(0.8); opacity: 0; }
            10% { opacity: 0.6; }
            50% { transform: translateY(-50vh) translateX(var(--drift)) translateZ(30px) rotateY(180deg) rotateX(20deg) scale(1); }
            100% { transform: translateY(-120vh) translateX(var(--drift-end)) translateZ(60px) rotateY(360deg) rotateX(40deg) scale(1.1); opacity: 0; }
        }

        /* --- GLOBAL STYLES --- */
        .fade-in { animation: fadeIn 0.4s ease-in-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        #toast-container { position: fixed; bottom: 20px; right: 20px; z-index: 50; }
        .toast { transform: translateX(100%); transition: transform 0.3s ease-out; }
        .toast.show { transform: translateX(0); }

        /* --- ADMIN PANEL OVERRIDES --- */

        body.admin-mode header,

            const scene = document.getElementById('balloon-scene');
            const colors = ['#4A7C59', '#A4C3B2', '#D4A373', '#EFECE6', '#8FBC8F', '#C2B280']; 
            for (let i = 0; i < 20; i++) {
                const balloon = document.createElement('div');
                balloon.classList.add('balloon');
                const left = Math.random() * 100;
                const duration = 15 + Math.random() * 25;
                const delay = Math.random() * -20;
                const size = 0.5 + Math.random() * 0.6;
                const color = colors[Math.floor(Math.random() * colors.length)];
                const drift = (Math.random() - 0.5) * 300 + 'px';
                const driftEnd = (Math.random() - 0.5) * 500 + 'px';

                balloon.style.left = `${left}%`;
                balloon.style.animationDuration = `${duration}s`;
                balloon.style.animationDelay = `${delay}s`;
                balloon.style.transform = `scale(${size})`;
                balloon.style.setProperty('--b-color', color);
                balloon.style.setProperty('--drift', drift);
                balloon.style.setProperty('--drift-end', driftEnd);
                scene.appendChild(balloon);
            }
            balloonsInitialized = true;
        }

    method: "PUT",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ action: action })
  })
  .then(res => res.json())

    showToast(data.message || "Booking updated!", "success");
    // Update local data too
    const order = adminOrders.find(o => o.id === id);
    if (order) {
        order.order_status = action === 'accept' ? 'Confirmed' : 'Rejected';
        order.payment_status = action === 'accept' ? 'Paid' : 'Pending';
    }
    document.getElementById('app-container').innerHTML = views.admin();
  })
  .catch(() => {
    // Update local dummy data directly if API unavailable
    const order = adminOrders.find(o => o.id === id);
    if (order) {
        order.order_status = action === 'accept' ? 'Confirmed' : 'Rejected';
        order.payment_status = action === 'accept' ? 'Paid' : 'Pending';
        showToast("Booking updated successfully!", "success");
    }
    document.getElementById('app-container').innerHTML = views.admin();
  });
}

async function loadAdminBookings() {
  const response = await fetch("http://localhost:3000/api/admin/bookings");
  const data = await response.json();

  const tableBody = document.getElementById("admin-orders-body");
  tableBody.innerHTML = "";

  data.forEach(booking => {
    tableBody.innerHTML += `
      <tr>
        <td>${booking.id}</td>
        <td>${booking.name}</td>
        <td>${booking.theme_name}</td>
        <td>${new Date(booking.event_date).toLocaleDateString()}</td>
        <td>${booking.order_status}</td>
        <td>${booking.payment_status}</td>
        <td>
          ${
            booking.order_status === "Pending"
              ? `
                <button onclick="updateBookingStatus(${booking.id}, 'accept')">✔</button>
                <button onclick="updateBookingStatus(${booking.id}, 'reject')">❌</button>
              `
              : "N/A"
          }
        </td>
      </tr>
    `;
  });
}


// 🔹 Accept / Reject function
async function updateBookingStatus(id, action) {
  const response = await fetch(`http://localhost:3000/api/admin/bookings/${id}`, {
    method: "PUT",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ action })
  });

  const result = await response.json();
  alert(result.message);

  loadAdminBookings(); // refresh table
}

function loadMyBookings() {

  const email = localStorage.getItem("userEmail");

  if(!email){
    document.getElementById("user-bookings-container").innerHTML =
      "<p>Please login to see your bookings.</p>";
    return;
  }

  fetch(`/api/user-bookings/${email}`)
    .then(res => res.json())
    .then(data => {

      if(data.length === 0){
        document.getElementById("user-bookings-container").innerHTML =
          "<p>No bookings found.</p>";
        return;
      }

      const bookingsHTML = data.map(order => {

        let statusText = "";

        if(order.order_status === "Confirmed"){
          statusText = `<span class="text-green-600 font-bold">Order Confirmed ✅</span>`;
        }
        else if(order.order_status === "Rejected"){
          statusText = `<span class="text-red-600 font-bold">Refund Processing 💸</span>`;
        }
        else{
          statusText = `<span class="text-yellow-600 font-bold">Pending ⏳</span>`;
        }

        return `
          <div class="p-4 border rounded bg-white shadow">
            <h3 class="font-bold">${order.theme_name}</h3>
            <p>Date: ${new Date(order.event_date).toLocaleDateString()}</p>
            <p>${statusText}</p>
          </div>
        `;
      }).join("");

      document.getElementById("user-bookings-container").innerHTML = bookingsHTML;

    })
    .catch(err => console.log(err));
}
