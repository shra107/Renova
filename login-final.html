<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RENOVA - Login & Register</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts: Poppins for a modern, elegant look -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        renova: {
                            beige: '#F5F1E8',
                            greenLight: '#A4C3B2',
                            greenDeep: '#4A7C59',
                            cream: '#FDFBF7',
                            candle: '#D4A373',
                            error: '#E63946'
                        }
                    },
                    fontFamily: {
                        sans: ['Poppins', 'sans-serif'],
                    },
                    animation: {
                        'float-slow': 'float 6s ease-in-out infinite',
                        'float-medium': 'float 5s ease-in-out infinite',
                        'float-fast': 'float 4s ease-in-out infinite',
                        'flicker': 'flicker 3s infinite alternate',
                        'pulse-glow': 'pulseGlow 4s infinite',
                        'slide-up': 'slideUp 0.6s ease-out forwards',
                        'fade-in': 'fadeIn 0.8s ease-out forwards',
                    },
                    keyframes: {
                        float: {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-20px)' },
                        },
                        flicker: {
                            '0%, 100%': { opacity: '0.8', transform: 'scale(1)' },
                            '25%': { opacity: '0.6', transform: 'scale(0.95)' },
                            '50%': { opacity: '0.9', transform: 'scale(1.05)' },
                            '75%': { opacity: '0.7', transform: 'scale(0.98)' },
                        },
                        pulseGlow: {
                            '0%, 100%': { opacity: '0.3', transform: 'scale(1)' },
                            '50%': { opacity: '0.6', transform: 'scale(1.2)' },
                        },
                        slideUp: {
                            '0%': { transform: 'translateY(30px)', opacity: '0' },
                            '100%': { transform: 'translateY(0)', opacity: '1' },
                        },
                        fadeIn: {
                            '0%': { opacity: '0' },
                            '100%': { opacity: '1' },
                        }
                    }
                }
            }
        }
    </script>

    <style>
        /* Custom Styles for Glassmorphism and Special Effects */
        body {
            background: linear-gradient(135deg, #F5F1E8 0%, #A4C3B2 100%);
            overflow-x: hidden;
            font-family: 'Poppins', sans-serif;
        }

        /* Glassmorphism Card */
        .glass-card {
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 8px 32px 0 rgba(74, 124, 89, 0.15);
        }

        /* Floating Eco Balloons */
        .balloon {
            position: absolute;
            border-radius: 50% 50% 50% 50% / 40% 40% 60% 60%;
            opacity: 0.6;
            z-index: 0;
            filter: blur(1px);
        }
        
        .balloon::after {
            content: '';
            position: absolute;
            bottom: -15%;
            left: 50%;
            width: 2px;
            height: 40px;
            background: rgba(74, 124, 89, 0.4);
            transform: translateX(-50%);
        }

        /* Particles/Sparks */
        .spark {
            position: absolute;
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
        }

        /* Candle Lights */
        .candle-light {
            position: absolute;
            border-radius: 50%;
            background: radial-gradient(circle, #D4A373 0%, rgba(212, 163, 115, 0) 70%);
            opacity: 0.4;
            z-index: 0;
            filter: blur(8px);
        }

        /* Form Input Styles */
        .input-field {
            background: rgba(255, 255, 255, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.5);
            transition: all 0.3s ease;
        }
        
        .input-field:focus {
            background: rgba(255, 255, 255, 0.9);
            border-color: #4A7C59;
            box-shadow: 0 0 0 4px rgba(74, 124, 89, 0.1);
            outline: none;
        }

        /* Button Styles */
        .btn-primary {
            background: linear-gradient(135deg, #4A7C59 0%, #3A6346 100%);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(74, 124, 89, 0.3);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        /* Toggle Animation Classes */
        .form-container {
            transition: opacity 0.4s ease, transform 0.4s ease;
        }
        
        .hidden-form {
            display: none;
            opacity: 0;
            transform: translateX(20px);
        }

        .visible-form {
            display: block;
            opacity: 1;
            transform: translateX(0);
            animation: slideUp 0.5s ease-out forwards;
        }

        /* Leaf Animation */
        .leaf-icon {
            animation: sway 3s ease-in-out infinite;
            transform-origin: bottom center;
        }

        @keyframes sway {
            0%, 100% { transform: rotate(-5deg); }
            50% { transform: rotate(5deg); }
        }

        /* Loader */
        .loader {
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top: 3px solid white;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center relative selection:bg-renova-greenDeep selection:text-white">

    <!-- Background Elements Container -->
    <div id="bg-animation" class="fixed inset-0 overflow-hidden pointer-events-none">
        <!-- Javascript will inject balloons, sparks, and candles here -->
    </div>

    <!-- Main Container -->
    <main class="relative z-10 w-full max-w-md p-6 mx-4 animate-fade-in">
        
        <!-- Glass Card -->
        <div class="glass-card rounded-3xl p-8 w-full relative overflow-hidden">
            
            <!-- Decorative Glow Top Left -->
            <div class="absolute -top-10 -left-10 w-32 h-32 bg-renova-greenLight rounded-full mix-blend-multiply filter blur-2xl opacity-40 animate-float-slow"></div>
            <!-- Decorative Glow Bottom Right -->
            <div class="absolute -bottom-10 -right-10 w-32 h-32 bg-renova-candle rounded-full mix-blend-multiply filter blur-2xl opacity-30 animate-float-medium"></div>

            <!-- Branding Section -->
            <div class="text-center mb-8 relative">
                <div class="inline-flex items-center justify-center space-x-2 mb-2">
                    <i class="fa-solid fa-leaf text-renova-greenDeep text-2xl leaf-icon"></i>
                    <h1 class="text-3xl font-bold text-renova-greenDeep tracking-wide">RENOVA</h1>
                </div>
                <p class="text-sm text-renova-greenDeep/80 font-medium tracking-wide">
                    Celebrate Responsibly.<br>Rent, Reuse, Renew.
                </p>
            </div>

            <!-- Notification Area (Toast Style) -->
            <div id="notification-area" class="mb-4 hidden">
                <div id="notification-msg" class="p-3 rounded-lg text-sm text-center font-medium shadow-sm transition-all duration-300">
                    <!-- Message injected by JS -->
                </div>
            </div>

            <!-- Forms Container -->
            <div class="relative min-h-[380px]">
                
                <!-- Login Form -->
                <form id="login-form" class="visible-form absolute inset-0 w-full space-y-5">
                    <div>
                        <label for="login-email" class="block text-xs font-semibold text-renova-greenDeep/70 uppercase tracking-wider mb-1 ml-1">Email</label>
                        <div class="relative">
                            <i class="fa-solid fa-envelope absolute left-4 top-1/2 transform -translate-y-1/2 text-renova-greenDeep/50"></i>
                            <input type="email" id="login-email" placeholder="Email" class="input-field w-full pl-10 pr-4 py-3 rounded-xl text-renova-greenDeep placeholder-renova-greenDeep/40 focus:outline-none text-sm">
                        </div>
                    </div>
                    
                    <div>
                        <label for="login-password" class="block text-xs font-semibold text-renova-greenDeep/70 uppercase tracking-wider mb-1 ml-1">Password</label>
                        <div class="relative">
                            <i class="fa-solid fa-lock absolute left-4 top-1/2 transform -translate-y-1/2 text-renova-greenDeep/50"></i>
                            <input type="password" id="login-password" placeholder="********" class="input-field w-full pl-10 pr-4 py-3 rounded-xl text-renova-greenDeep placeholder-renova-greenDeep/40 focus:outline-none text-sm">
                        </div>
                    </div>

                    <div class="flex items-center justify-between text-xs text-renova-greenDeep/70">
                        <label class="flex items-center space-x-2 cursor-pointer">
                            <input type="checkbox" class="accent-renova-greenDeep rounded">
                            <span>Remember me</span>
                        </label>
                        <a href="#" class="hover:text-renova-candle transition-colors">Forgot Password?</a>
                    </div>

                    <button type="button" id="btn-login"
                    class="btn-primary w-full py-3.5 rounded-xl text-white font-semibold shadow-lg shadow-renova-greenDeep/20 flex items-center justify-center space-x-2">
                        <span>Login to Dashboard</span>
                        <i class="fa-solid fa-arrow-right text-xs"></i>
                    </button>

                    <div class="text-center mt-6">
                        <p class="text-sm text-renova-greenDeep/80">
                            Don't have an account? 
                            <a href="#" id="toggle-register" class="font-bold text-renova-greenDeep hover:text-renova-candle transition-colors underline decoration-dotted underline-offset-4">Register</a>
                        </p>
                    </div>
                </form>
      
                <!-- Register Form -->
                <form id="register-form" class="hidden-form absolute inset-0 w-full space-y-4">
                 
                    <div>
                        <label for="reg-name" class="block text-xs font-semibold text-renova-greenDeep/70 uppercase tracking-wider mb-1 ml-1">Full Name</label>
                        <div class="relative">
                            <i class="fa-solid fa-user absolute left-4 top-1/2 transform -translate-y-1/2 text-renova-greenDeep/50"></i>
                            <input type="text" id="reg-name" placeholder="Enter full name " class="input-field w-full pl-10 pr-4 py-3 rounded-xl text-renova-greenDeep placeholder-renova-greenDeep/40 focus:outline-none text-sm">
                        </div>
                    </div>

                    <div>
                        <label for="reg-email" class="block text-xs font-semibold text-renova-greenDeep/70 uppercase tracking-wider mb-1 ml-1">Email Address</label>
                        <div class="relative">
                            <i class="fa-solid fa-envelope absolute left-4 top-1/2 transform -translate-y-1/2 text-renova-greenDeep/50"></i>
                            <input type="email" id="reg-email" placeholder="Email" class="input-field w-full pl-10 pr-4 py-3 rounded-xl text-renova-greenDeep placeholder-renova-greenDeep/40 focus:outline-none text-sm">
                        </div>
                    </div>
                     <div>
                        <label for="reg-Phone" class="block text-xs font-semibold text-renova-greenDeep/70 uppercase tracking-wider mb-1 ml-1">Phone Number</label>
                        <div class="relative">
                            <i class="fa-solid fa-lock absolute left-4 top-1/2 transform -translate-y-1/2 text-renova-greenDeep/50"></i>
                            <input type="text" id="reg-Phone" placeholder="Phone Number" class="input-field w-full pl-10 pr-4 py-3 rounded-xl text-renova-greenDeep placeholder-renova-greenDeep/40 focus:outline-none text-sm">
                        </div>
                    </div>
                    
                    <div>
                        <label for="reg-password" class="block text-xs font-semibold text-renova-greenDeep/70 uppercase tracking-wider mb-1 ml-1">Create Password</label>
                        <div class="relative">
                            <i class="fa-solid fa-lock absolute left-4 top-1/2 transform -translate-y-1/2 text-renova-greenDeep/50"></i>
                            <input type="password" id="reg-password" placeholder="*********" class="input-field w-full pl-10 pr-4 py-3 rounded-xl text-renova-greenDeep placeholder-renova-greenDeep/40 focus:outline-none text-sm">
                        </div>
                    </div>

                    <button type="submit" id="btn-register" class="btn-primary w-full py-3.5 rounded-xl text-white font-semibold shadow-lg shadow-renova-greenDeep/20 flex items-center justify-center space-x-2 mt-2">
                        <span>Create Account</span>
                        <i class="fa-solid fa-seedling text-xs"></i>
                    </button>

                    <div class="text-center mt-4">
                        <p class="text-sm text-renova-greenDeep/80">
                            Already have an account? 
                            <a href="#" id="toggle-login" class="font-bold text-renova-greenDeep hover:text-renova-candle transition-colors underline decoration-dotted underline-offset-4">Login</a>
                        </p>
                    </div>
                </form>

            </div>
        </div>
        
        <!-- Footer / Eco Message -->
        <div class="text-center mt-8 opacity-70">
             <p class="text-xs text-renova-greenDeep/90 flex items-center justify-center gap-2">
                <i class="fa-solid fa-tree"></i>
                <span>Join our eco-conscious community.</span>
             </p>
        </div>

    </main>

    <script>
        // --- 1. Background Animation Generator ---
        const bgContainer = document.getElementById('bg-animation');

        function createBalloon(index) {
            const balloon = document.createElement('div');
            balloon.classList.add('balloon');
            
            // Randomize properties for organic feel
            const size = Math.random() * 40 + 40; // 40px to 80px
            const left = Math.random() * 100; // 0% to 100% width
            const duration = Math.random() * 10 + 10; // 10s to 20s float duration
            const delay = Math.random() * 5;
            const colorChoice = Math.random();
            
            // Colors based on palette
            let bg = '';
            if(colorChoice < 0.33) bg = 'rgba(74, 124, 89, 0.15)'; // Green
            else if(colorChoice < 0.66) bg = 'rgba(164, 195, 178, 0.3)'; // Light Green
            else bg = 'rgba(212, 163, 115, 0.2)'; // Candle accent

            balloon.style.width = `${size}px`;
            balloon.style.height = `${size * 1.2}px`;
            balloon.style.left = `${left}%`;
            balloon.style.bottom = `-${size}px`; // Start below screen
            balloon.style.background = `radial-gradient(circle at 30% 30%, rgba(255,255,255,0.4), ${bg})`;
            
            // Apply float animation
            balloon.style.animation = `float ${duration}s ease-in-out ${delay}s infinite`;
            
            // Move upwards slowly
            balloon.animate([
                { transform: 'translateY(0)' },
                { transform: `translateY(-110vh)` }
            ], {
                duration: duration * 1000,
                iterations: Infinity,
                delay: delay * 1000,
                easing: 'linear'
            });

            bgContainer.appendChild(balloon);
        }

        function createSpark() {
            const spark = document.createElement('div');
            spark.classList.add('spark');
            
            const size = Math.random() * 4 + 2;
            const left = Math.random() * 100;
            const top = Math.random() * 100;
            const duration = Math.random() * 3 + 2;
            
            spark.style.width = `${size}px`;
            spark.style.height = `${size}px`;
            spark.style.left = `${left}%`;
            spark.style.top = `${top}%`;
            spark.style.background = 'rgba(255, 255, 200, 0.6)'; // Warm light
            
            // Use Tailwind utility for animation but customize via style
            spark.style.animation = `pulseGlow ${duration}s infinite alternate`;
            
            bgContainer.appendChild(spark);
        }

        function createCandleLight() {
            const light = document.createElement('div');
            light.classList.add('candle-light');
            
            const size = Math.random() * 150 + 100;
            const left = Math.random() * 100;
            const top = Math.random() * 100;
            
            light.style.width = `${size}px`;
            light.style.height = `${size}px`;
            light.style.left = `${left}%`;
            light.style.top = `${top}%`;
            light.style.animation = 'flicker 4s infinite alternate';
            
            bgContainer.appendChild(light);
        }

        // Initialize Animations
        function initBackground() {
            // Create Balloons
            for(let i = 0; i < 8; i++) {
                createBalloon(i);
            }
            // Create Sparks
            for(let i = 0; i < 20; i++) {
                createSpark();
            }
            // Create Candle Glows
            for(let i = 0; i < 4; i++) {
                createCandleLight();
            }
        }

        initBackground();

        // --- 2. Form Toggle Logic ---
        const loginForm = document.getElementById('login-form');
        const registerForm = document.getElementById('register-form');
        const toggleRegister = document.getElementById('toggle-register');
        const toggleLogin = document.getElementById('toggle-login');
        const notificationArea = document.getElementById('notification-area');
        const notificationMsg = document.getElementById('notification-msg');

        function showNotification(message, type = 'error') {
            notificationArea.classList.remove('hidden');
            notificationMsg.textContent = message;
            
            // Reset classes
            notificationMsg.className = 'p-3 rounded-lg text-sm text-center font-medium shadow-sm transition-all duration-300';
            
            if (type === 'error') {
                notificationMsg.classList.add('bg-red-100', 'text-red-700', 'border', 'border-red-200');
            } else {
                notificationMsg.classList.add('bg-green-100', 'text-green-700', 'border', 'border-green-200');
            }

            // Auto hide after 5 seconds
            setTimeout(() => {
                notificationArea.classList.add('hidden');
            }, 5000);
        }

        toggleRegister.addEventListener('click', (e) => {
            e.preventDefault();
            loginForm.classList.replace('visible-form', 'hidden-form');
            loginForm.style.display = 'none'; // Ensure display none after animation
            
            registerForm.style.display = 'block';
            // Small delay to allow display block to render before opacity transition
            setTimeout(() => {
                registerForm.classList.replace('hidden-form', 'visible-form');
            }, 10);
            
            notificationArea.classList.add('hidden');
        });

        toggleLogin.addEventListener('click', (e) => {
            e.preventDefault();
            registerForm.classList.replace('visible-form', 'hidden-form');
            registerForm.style.display = 'none';
            
            loginForm.style.display = 'block';
            setTimeout(() => {
                loginForm.classList.replace('hidden-form', 'visible-form');
            }, 10);
            
            notificationArea.classList.add('hidden');
        });

        // --- 3. API Interaction Logic ---

        // Helper to set loading state
        function setLoading(btnId, isLoading, originalText) {
            const btn = document.getElementById(btnId);
            if (isLoading) {
                const originalContent = btn.innerHTML;
                btn.setAttribute('data-original-text', originalContent);
                btn.disabled = true;
                btn.innerHTML = `<div class="loader mr-2"></div> Processing...`;
                btn.classList.add('opacity-80', 'cursor-not-allowed');
            } else {
                btn.disabled = false;
                btn.innerHTML = originalText;
                btn.classList.remove('opacity-80', 'cursor-not-allowed');
            }
        }

        // Login Handler
        document.getElementById('btn-login').addEventListener('click', async () => {
            notificationArea.classList.add('hidden');

            const email = document.getElementById('login-email').value.trim();
            const password = document.getElementById('login-password').value.trim();

            if (!email || !password) {
                showNotification('Please fill in all fields.', 'error');
                return;
            }

            setLoading('btn-login', true);

            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (!response.ok || !data.success) {
                    throw new Error(data.message || 'Invalid email or password');
                }

                // Save user info
                localStorage.setItem("userEmail", email);
                localStorage.setItem("userName", data.name || '');
                localStorage.setItem("userPhone", data.phone || '');
                localStorage.setItem("role", data.role || 'user');

                showNotification('Login successful! Redirecting...', 'success');

                setTimeout(() => {
                    window.location.href = '/renova';
                }, 1000);

            } catch (error) {
                showNotification(error.message || 'Login failed. Please try again.', 'error');
                setLoading('btn-login', false, `<span>Login to Dashboard</span><i class="fa-solid fa-arrow-right text-xs"></i>`);
            }
        });

        // Register Handler
        registerForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            notificationArea.classList.add('hidden');

            const name = document.getElementById('reg-name').value.trim();
            const email = document.getElementById('reg-email').value.trim();
            const phone = document.getElementById('reg-Phone').value.trim();
            const password = document.getElementById('reg-password').value.trim();

            if (!name || !email || !phone || !password) {
                showNotification('Please complete all fields.', 'error');
                return;
            }

            setLoading('btn-register', true);

            try {
                const response = await fetch('/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, email, phone, password })
                });

                const data = await response.json();

                if (!data.success) {
                    throw new Error(data.message || 'Registration failed');
                }

                showNotification('Account created! Please login.', 'success');

                document.getElementById('reg-name').value = '';
                document.getElementById('reg-email').value = '';
                document.getElementById('reg-Phone').value = '';
                document.getElementById('reg-password').value = '';

                setTimeout(() => { toggleLogin.click(); }, 1500);

            } catch (error) {
                showNotification(error.message || 'Registration failed. Email might already exist.', 'error');
            }

            setLoading('btn-register', false, `<span>Create Account</span><i class="fa-solid fa-seedling text-xs"></i>`);
        });

        // Already logged in check
        window.addEventListener('load', () => {
            const email = localStorage.getItem("userEmail");
            if (email) console.log("User already logged in:", email);
        });
 </script>
</body>
</html>
